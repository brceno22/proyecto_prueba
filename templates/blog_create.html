{% extends "base.html" %}
{% block content %}
<form method='POST'>
{% csrf_token %}
title{{form.title}}
<br>
content{{form.content}}
<button class="text-gray-900 bg-gradient-to-r from-red-200 via-red-300 to-yellow-200 hover:bg-gradient-to-bl focus:ring-4 focus:outline-none focus:ring-red-100 dark:focus:ring-red-400 font-medium rounded-lg text-sm px-5 py-2.5 text-center me-2 mb-2" type='submit'>Submit</button>
</form>
{% endblock content %}
